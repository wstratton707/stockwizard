name: Daily Precompute Rankings (AM batch)

# AM batch: first 5 sectors (~165 tickers). The PM workflow finishes the rest.
# Splitting the run lets each batch comfortably fit in GitHub Actions' 6h
# job limit even when Polygon free-tier rate limits force long backoffs.

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 9 AM Eastern (14:00 UTC), weekdays only
  workflow_dispatch:           # Allow manual trigger from GitHub Actions tab

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run precompute (AM batch)
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python precompute.py "--sectors=Technology,Health Care,Financials,Consumer Discretionary,Consumer Staples"

      - name: Report result
        if: always()
        run: echo "AM precompute finished at $(date -u)"
