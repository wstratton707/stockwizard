name: Daily Precompute Rankings

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 9 AM Eastern (14:00 UTC), weekdays only
  workflow_dispatch:           # Allow manual trigger from GitHub Actions tab

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # Serial fetch of ~338 tickers needs up to 75 min on free tier

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run precompute
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python precompute.py

      - name: Report result
        if: always()
        run: echo "Precompute finished at $(date -u)"
